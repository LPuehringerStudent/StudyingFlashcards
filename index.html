<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Flashcard Trainer</h1>
    
    <div class="container">
        <!-- Input Section -->
        <div class="input-section" id="inputSection">
            <h2>Upload or Paste Your Flashcards</h2>
            
            <!-- JSON File Selector -->
            <div class="file-selector">
                <label for="repoFileSelect">Select from repository:</label>
                <select id="repoFileSelect">
                    <option value="">-- Choose a file --</option>
                    <option value="flashcards/Banm3SecondTest.json">Banm3SecondTest.json</option>
                </select>
                <button class="btn btn-small" onclick="loadFromRepo()">Load</button>
            </div>
            
            <div class="separator">or</div>
            
            <textarea id="jsonInput" placeholder="Paste your JSON flashcards here..."></textarea>
            <div id="errorMsg" class="error"></div>
            
            <div class="file-input-wrapper">
                <input type="file" id="fileInput" accept=".json,.txt">
                <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Load from File</button>
                <button class="btn" onclick="loadFlashcards()">Start Training</button>
                <button class="btn btn-secondary" onclick="loadSample()">Load Sample</button>
            </div>

            <div class="sample-data">
                <strong>Expected format:</strong>
                <code>[{"question": "...", "answer": "..."}, ...]</code>
            </div>
        </div>

        <!-- Flashcard Section -->
        <div class="flashcard-section" id="flashcardSection">
            <div class="progress">
                Card <span id="currentCard">1</span> of <span id="totalCards">0</span>
            </div>

            <div class="flashcard-container">
                <div class="flashcard" id="flashcard" onclick="flipCard()">
                    <div class="flashcard-face flashcard-front">
                        <span class="flashcard-label">Question</span>
                        <div class="flashcard-content" id="questionText"></div>
                    </div>
                    <div class="flashcard-face flashcard-back">
                        <span class="flashcard-label">Answer</span>
                        <div class="flashcard-content" id="answerText"></div>
                    </div>
                </div>
            </div>

            <div class="hint">Click card or press Space to flip</div>

            <div class="controls">
                <button class="btn btn-nav btn-secondary" onclick="previousCard()">Previous</button>
                <button class="btn btn-nav" onclick="flipCard()">Flip</button>
                <button class="btn btn-nav" onclick="nextCard()">Next</button>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="shuffleCards()">Shuffle</button>
                <button class="btn btn-secondary" onclick="resetToInput()">Edit Cards</button>
            </div>

            <div class="shuffle-info" id="shuffleInfo"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
